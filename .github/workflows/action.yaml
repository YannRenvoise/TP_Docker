name: CI - Docker Build & Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hello:latest ./hello

      - name: Run container
        run: docker run -d -p 4000:8080 --name test-container hello:latest

      - name: Wait for app to start
        run: sleep 10

      - name: Test endpoint
        run: |
          curl -f http://localhost:4000 || exit 1

      - name: Show logs if failure
        if: failure()
        run: docker logs test-container

      - name: Cleanup
        if: always()
        run: |
          docker stop test-container
          docker rm test-container